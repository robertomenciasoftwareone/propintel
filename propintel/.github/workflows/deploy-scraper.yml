name: Deploy Scraper → Azure Function App

on:
  push:
    branches: [main]
    paths:
      - 'propintel-scraper/**'
      - '.github/workflows/deploy-scraper.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Python scraper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: propintel-scraper
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: propintel-scraper       # Nombre del Function App en Azure
          package: propintel-scraper
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE }}

# ── Ejecución manual del scraper (sin esperar el schedule) ──────────────────
  run-now:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: deploy
    name: Run scraper now

    steps:
      - name: Trigger Function via HTTP
        run: |
          curl -X POST \
            "https://propintel-scraper.azurewebsites.net/api/HttpTrigger" \
            -H "x-functions-key: ${{ secrets.AZURE_FUNCTION_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"ciudades": ["madrid","asturias"], "paginas": 2}'
